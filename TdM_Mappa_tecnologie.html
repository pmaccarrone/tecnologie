<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa Tecnologica</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12}
body{font-family:system-ui,sans-serif;color:#fff;display:flex;flex-direction:column}

.header{padding:0.4rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.header h1{font-size:0.95rem;color:#00d4ff}
.header p{color:#666;font-size:0.55rem}
.btn{background:#1a1a2e;border:1px solid #333;color:#fff;padding:0.3rem 0.6rem;border-radius:4px;cursor:pointer;font-size:0.65rem;margin-left:0.3rem}
.btn:hover{border-color:#00d4ff;color:#00d4ff}
.btn.active{background:#00d4ff;color:#000}

.main{flex:1;display:flex;overflow:hidden;position:relative}

#tree{flex:1;display:block}

/* Filtri */
.filters-panel{width:0;overflow:hidden;background:#12121f;border-left:1px solid #333;transition:width 0.3s;flex-shrink:0}
.filters-panel.open{width:220px}
.filters-tab{position:fixed;right:0;top:70px;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;padding:0.8rem 0.4rem;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;font-size:0.75rem;color:#888;z-index:50;transition:all 0.2s}
.filters-tab:hover{background:#1a1a2e;color:#00d4ff;border-color:#00d4ff}
.filters-tab.active{background:#00d4ff;color:#000;border-color:#00d4ff;right:220px}
.filters-inner{width:220px;padding:1rem;height:100%;overflow-y:auto}
.filters-title{font-size:0.85rem;color:#00d4ff;margin-bottom:0.8rem;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.filters-title span{cursor:pointer;font-size:1.1rem;color:#888}
.filters-title span:hover{color:#fff}
.filter-group{margin-bottom:1rem}
.filter-group-title{font-size:0.7rem;color:#888;text-transform:uppercase;margin-bottom:0.4rem;letter-spacing:0.5px}
.filter-item{display:flex;align-items:center;padding:0.3rem 0;cursor:pointer}
.filter-item:hover{background:rgba(255,255,255,0.05);margin:0 -0.5rem;padding:0.3rem 0.5rem;border-radius:4px}
.filter-item input{margin-right:0.5rem;accent-color:#00d4ff}
.filter-item label{font-size:0.8rem;cursor:pointer;flex:1}
.filter-item .count{font-size:0.7rem;color:#666}
.filter-reset{margin-top:1rem;width:100%;padding:0.5rem;background:#1a1a2e;border:1px solid #333;color:#888;border-radius:4px;cursor:pointer;font-size:0.75rem}
.filter-reset:hover{border-color:#00d4ff;color:#00d4ff}

.active-filters{padding:0.4rem 1rem;background:#1a1a2e;border-bottom:1px solid #333;font-size:0.75rem;color:#888;display:none}
.active-filters.visible{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.active-filters .tag{background:#00d4ff33;color:#00d4ff;padding:0.2rem 0.5rem;border-radius:4px;display:flex;align-items:center;gap:0.3rem}
.active-filters .tag span{cursor:pointer;font-weight:bold}

/* Links e nodi */
.link{stroke:#4a4a6a;stroke-width:2.5;fill:none;transition:all 0.3s}
.link.dimmed{stroke:#2a2a3a;stroke-width:1.5;opacity:0.4}
.link.highlighted{stroke:#00d4ff;stroke-width:5}
.link.filtered-out{stroke:#1a1a2a;stroke-width:1;opacity:0.15}

.node{cursor:pointer;transition:opacity 0.3s}
.node text{pointer-events:none;fill:#fff}
.node.dimmed{opacity:0.35}
.node.highlighted rect,.node.highlighted circle{stroke:#00d4ff;stroke-width:5;filter:drop-shadow(0 0 10px #00d4ff)}
.node.filtered-out{opacity:0.1}

.L0 circle{fill:#00d4ff;stroke:#00d4ff;stroke-width:3}
.L0 text{fill:#000;font-weight:bold}
.L1 rect{fill:#c62828;stroke:#c62828;stroke-width:2;rx:6}
.L1 text{fill:#fff;font-weight:600}
.L2 rect{fill:#f9a825;stroke:#f9a825;stroke-width:2;rx:5}
.L2 text{fill:#000;font-weight:500}
.L3 rect{fill:#1565c0;stroke:#1565c0;stroke-width:2;rx:5}
.L3 text{fill:#fff}
.L4 rect{fill:#0d1117;stroke:#4fc3f7;stroke-width:2;rx:4}
.L4 text{fill:#4fc3f7}
.node.fixed rect,.node.fixed circle{stroke:#fff;stroke-width:4;filter:drop-shadow(0 0 6px rgba(255,255,255,0.5))}

/* Breadcrumb */
.breadcrumb{position:fixed;bottom:12px;left:12px;background:#1a1a2eee;padding:0.6rem 1rem;border-radius:8px;font-size:0.9rem;color:#aaa;border:1px solid #333;max-width:60%;display:none;backdrop-filter:blur(5px)}
.breadcrumb.visible{display:flex;align-items:center;flex-wrap:wrap;gap:0.2rem}
.breadcrumb .crumb{color:#00d4ff;font-weight:600;cursor:pointer;padding:0.2rem 0.5rem;border-radius:4px;transition:all 0.2s}
.breadcrumb .crumb:hover{background:rgba(0,212,255,0.2)}
.breadcrumb .crumb.current{background:rgba(0,212,255,0.3);text-decoration:underline}
.breadcrumb .arrow{color:#555;margin:0 0.1rem;font-size:0.8rem}
.breadcrumb .descendants{color:#4CAF50;font-size:0.8rem;margin-left:0.5rem;font-weight:500}

/* Legenda - tab verticale come filtri */
.legend-tab{position:fixed;right:0;top:160px;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;padding:0.8rem 0.4rem;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;font-size:0.75rem;color:#888;z-index:50;transition:all 0.2s}
.legend-tab:hover{background:#1a1a2e;color:#00d4ff;border-color:#00d4ff}
.legend-tab.active{background:#00d4ff;color:#000;border-color:#00d4ff;right:180px}
.legend-panel{position:fixed;right:0;top:160px;width:0;height:auto;overflow:hidden;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;transition:width 0.3s;z-index:49}
.legend-panel.open{width:180px}
.legend-inner{width:180px;padding:0.8rem}
.legend-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.4rem}
.legend-item:last-child{margin-bottom:0}
.legend-color{width:16px;height:16px;border-radius:3px}
.legend-color.circle{border-radius:50%}

/* Popup tecnologia */
.tech-popup{position:fixed;background:#1a1a2e;border:2px solid #4fc3f7;border-radius:10px;padding:1rem;max-width:350px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;backdrop-filter:blur(5px)}
.tech-popup.visible{display:block}
.tech-popup .close{position:absolute;top:8px;right:12px;cursor:pointer;color:#888;font-size:1.2rem}
.tech-popup .close:hover{color:#fff}
.tech-popup h3{color:#4fc3f7;font-size:1rem;margin-bottom:0.5rem;padding-right:1.5rem}
.tech-popup .cat{display:inline-block;background:#c62828;color:#fff;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.7rem;margin-bottom:0.5rem}
.tech-popup .desc{font-size:0.8rem;color:#ccc;margin-bottom:0.6rem;line-height:1.4}
.tech-popup .mat{font-size:0.75rem;color:#888;margin-bottom:0.6rem}
.tech-popup .mat strong{color:#aaa}
.tech-popup .reqs{display:flex;flex-wrap:wrap;gap:0.3rem;margin-bottom:0.8rem}
.tech-popup .req-tag{background:#2a2a4a;color:#aaa;padding:0.15rem 0.4rem;border-radius:3px;font-size:0.65rem}
.tech-popup .btn-open{width:100%;padding:0.5rem;background:linear-gradient(135deg,#00695C,#00897B);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.2s}
.tech-popup .btn-open:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,105,92,0.4)}

/* Tooltip */
.node-tooltip{position:fixed;background:#1a1a2eee;border:1px solid #00d4ff;border-radius:8px;padding:0.6rem 0.8rem;max-width:280px;z-index:150;box-shadow:0 4px 16px rgba(0,0,0,0.4);pointer-events:none;display:none;backdrop-filter:blur(5px)}
.node-tooltip.visible{display:block}
.node-tooltip .tt-name{color:#00d4ff;font-weight:600;font-size:0.85rem;margin-bottom:0.3rem}
.node-tooltip .tt-path{color:#888;font-size:0.7rem;margin-bottom:0.4rem}
.node-tooltip .tt-desc{color:#ccc;font-size:0.75rem;line-height:1.3}
.node-tooltip .tt-reqs{display:flex;flex-wrap:wrap;gap:0.2rem;margin-top:0.4rem}
.node-tooltip .tt-req{background:#2a2a4a;color:#aaa;padding:0.1rem 0.3rem;border-radius:3px;font-size:0.6rem}
.node-tooltip .tt-count{color:#4CAF50;font-size:0.7rem;margin-top:0.3rem}

/* Autocomplete */
.autocomplete-container{position:relative;display:inline-block;margin-right:0.5rem}
.autocomplete-dropdown{position:absolute;top:100%;left:0;right:0;min-width:280px;max-height:350px;overflow-y:auto;background:#1a1a2e;border:1px solid #00d4ff;border-top:none;border-radius:0 0 8px 8px;z-index:1000;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
.autocomplete-dropdown.visible{display:block}
.autocomplete-item{padding:0.5rem 0.8rem;cursor:pointer;border-bottom:1px solid #2a2a4a;transition:all 0.15s}
.autocomplete-item:last-child{border-bottom:none}
.autocomplete-item:hover{background:#2a2a4a}
.autocomplete-item .item-name{font-size:0.85rem;color:#fff;font-weight:500}
.autocomplete-item .item-path{font-size:0.65rem;color:#888;margin-top:0.2rem;display:flex;align-items:center;gap:0.3rem;flex-wrap:wrap}
.autocomplete-item .item-path .path-arrow{color:#555}
.autocomplete-item .item-path .path-segment{color:#666}
.autocomplete-item .item-path .path-segment.cat{color:#c62828}
.autocomplete-item .item-path .path-segment.tip{color:#f9a825}
.autocomplete-item .item-path .path-segment.mat{color:#1565c0}
.autocomplete-item.level-1 .item-name{color:#ff5252}
.autocomplete-item.level-2 .item-name{color:#ffd740}
.autocomplete-item.level-3 .item-name{color:#448aff}
.autocomplete-item.level-4 .item-name{color:#4fc3f7}
.autocomplete-no-results{padding:0.8rem;text-align:center;color:#666;font-size:0.8rem}
</style>
</head>
<body>

<div class="header" style="padding:0.3rem 1rem;display:flex;align-items:center;justify-content:flex-end;gap:0.4rem;flex-wrap:nowrap;overflow-x:auto">
  <div style="position:relative;display:inline-block;margin-right:auto">
    <input type="text" id="searchTech" placeholder="🔍 Ricerca tecnologia..." style="padding:0.3rem 0.6rem;border:1px solid #333;background:#1a1a2e;color:#fff;border-radius:4px;font-size:0.7rem;width:180px" oninput="handleSearch(this.value)" autocomplete="off">
    <div id="searchResults" style="position:absolute;top:100%;left:0;width:300px;max-height:350px;overflow-y:auto;background:#1a1a2e;border:1px solid #00d4ff;border-radius:0 0 8px 8px;z-index:9999;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5)"></div>
  </div>
  <button class="btn" onclick="fitView()">⊡ Fit Tutto</button>
  <button class="btn" onclick="fitSelection()">◎ Fit Selez.</button>
  <button class="btn" onclick="clearSelection()">✕ Deseleziona</button>
  <button class="btn" onclick="releaseAll()" title="Sblocca nodi fissati">⊙ Sblocca</button>
  <button class="btn" onclick="restoreLayout()" title="Ripristina layout">↺ Ripristina</button>
  <button class="btn" onclick="resetPositions()" title="Reset posizioni">↻ Reset</button>
  <button class="btn" onclick="reheat()">⟳ Riordina</button>
</div>

<div class="active-filters" id="activeFilters"></div>

<div class="main">
  <div class="filters-tab" id="filtersTab" onclick="toggleFilters()">☰ FILTRI</div>
  <svg id="tree"></svg>
  
  <div class="filters-panel" id="filtersPanel">
    <div class="filters-inner">
      <div class="filters-title">Requisiti<span onclick="toggleFilters()">✕</span></div>
      <div class="filter-group">
        <div class="filter-group-title">Proprietà ottiche</div>
        <div class="filter-item"><input type="checkbox" id="f_trasparente" onchange="applyFilters()"><label for="f_trasparente">Trasparente</label><span class="count" id="c_trasparente"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_traslucido" onchange="applyFilters()"><label for="f_traslucido">Traslucido</label><span class="count" id="c_traslucido"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_opaco" onchange="applyFilters()"><label for="f_opaco">Opaco</label><span class="count" id="c_opaco"></span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Proprietà meccaniche</div>
        <div class="filter-item"><input type="checkbox" id="f_rigido" onchange="applyFilters()"><label for="f_rigido">Rigido</label><span class="count" id="c_rigido"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_flessibile" onchange="applyFilters()"><label for="f_flessibile">Flessibile</label><span class="count" id="c_flessibile"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_elastico" onchange="applyFilters()"><label for="f_elastico">Elastico</label><span class="count" id="c_elastico"></span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Proprietà elettriche</div>
        <div class="filter-item"><input type="checkbox" id="f_conduttivo_el" onchange="applyFilters()"><label for="f_conduttivo_el">Conduttivo el.</label><span class="count" id="c_conduttivo_el"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_isolante_el" onchange="applyFilters()"><label for="f_isolante_el">Isolante el.</label><span class="count" id="c_isolante_el"></span></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-title">Proprietà termiche</div>
        <div class="filter-item"><input type="checkbox" id="f_conduttivo_th" onchange="applyFilters()"><label for="f_conduttivo_th">Conduttivo th.</label><span class="count" id="c_conduttivo_th"></span></div>
        <div class="filter-item"><input type="checkbox" id="f_isolante_th" onchange="applyFilters()"><label for="f_isolante_th">Isolante th.</label><span class="count" id="c_isolante_th"></span></div>
      </div>
      <button class="filter-reset" onclick="resetFilters()">Reset filtri</button>
    </div>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>

<div class="legend-tab" id="legendTab" onclick="toggleLegend()">◉ LEGENDA</div>
<div class="legend-panel" id="legendPanel">
  <div class="legend-inner">
    <div class="legend-item"><div class="legend-color circle" style="background:#00d4ff"></div>Forma</div>
    <div class="legend-item"><div class="legend-color" style="background:#c62828"></div>Tipologia</div>
    <div class="legend-item"><div class="legend-color" style="background:#f9a825"></div>Cavità/Attributo</div>
    <div class="legend-item"><div class="legend-color" style="background:#1565c0"></div>Materiale</div>
    <div class="legend-item"><div class="legend-color" style="background:#0d1117;border:2px solid #4fc3f7"></div>Tecnologia</div>
  </div>
</div>

<div class="tech-popup" id="techPopup">
  <span class="close" onclick="closePopup()">✕</span>
  <h3 id="popupTitle"></h3>
  <div class="cat" id="popupCat"></div>
  <div class="desc" id="popupDesc"></div>
  <div class="mat" id="popupMat"></div>
  <div class="reqs" id="popupReqs"></div>
  <button class="btn-open" onclick="openFullCard()">🔍 Apri scheda completa nel Database</button>
</div>

<div class="tech-popup" id="selectionBox" style="left:20px;top:100px;"></div>

<div class="tech-popup" id="selectionBox" style="left:20px;top:100px;"></div>

<div class="node-tooltip" id="nodeTooltip"></div>

var REQ_LIST = ['trasparente', 'traslucido', 'opaco', 'rigido', 'flessibile', 'elastico', 'conduttivo_el', 'isolante_el', 'conduttivo_th', 'isolante_th'];
REQ_LIST.forEach(function(r) {

});

nodes.forEach(function(d) {

  .force('y', d3.forceY(height / 2).strength(0.005))

var link = g.append('g').selectAll('path').data(links).enter().append('path').attr('class', 'link');

var node = g.append('g').selectAll('g').data(nodes).enter().append('g')

node.each(function(d) {

// Tooltip functions
var tooltipTimeout;
function showTooltip(event, d) {
  clearTimeout(tooltipTimeout);
  var tt = document.getElementById('nodeTooltip');
  var html = '<div class="tt-name">' + d.name + '</div>';
  
  // Percorso
  var pathParts = [];
  d.ancestors.slice().reverse().forEach(function(ancId) {
    var anc = nodes.find(function(x) { return x.id === ancId; });
    if (anc && anc.level > 0) pathParts.push(anc.name);
  });
  if (pathParts.length > 0) {
    html += '<div class="tt-path">' + pathParts.join(' › ') + '</div>';
  }
  
  // Per tecnologie (L4): mostra info extra
  if (d.level === 4 && d.techId && techInfo[d.techId]) {
    var info = techInfo[d.techId];
    if (info.descrizione) {
      var desc = info.descrizione.length > 100 ? info.descrizione.substring(0, 100) + '...' : info.descrizione;
      html += '<div class="tt-desc">' + desc + '</div>';
    }
    if (d.req && d.req.length > 0) {
      html += '<div class="tt-reqs">';
      d.req.slice(0, 5).forEach(function(r) {
        html += '<span class="tt-req">' + r + '</span>';
      });
      if (d.req.length > 5) html += '<span class="tt-req">+' + (d.req.length - 5) + '</span>';
      html += '</div>';
    }
  } else if (d.level < 4) {
    // Per categorie: mostra conteggio tecnologie
    var leafCount = d.descendantIds.filter(function(id) {
      var n = nodes.find(function(x) { return x.id === id; });
      return n && n.level === 4 && !n.filteredOut;
    }).length;
    if (leafCount > 0) {
      html += '<div class="tt-count">' + leafCount + ' tecnologie</div>';
    }
  }
  
  tt.innerHTML = html;
  tt.style.left = (event.clientX + 15) + 'px';
  tt.style.top = (event.clientY + 10) + 'px';
  tt.classList.add('visible');
}

function hideTooltip() {
  tooltipTimeout = setTimeout(function() {
    document.getElementById('nodeTooltip').classList.remove('visible');
  }, 100);
}

function moveTooltip(event) {
  var tt = document.getElementById('nodeTooltip');
  tt.style.left = (event.clientX + 15) + 'px';
  tt.style.top = (event.clientY + 10) + 'px';
}

function selectNode(d) {
  var idx = selectedNodes.findIndex(function(n) { return n.id === d.id; });
  if (idx >= 0) {
    selectedNodes.splice(idx, 1);
    popupNodes = popupNodes.filter(function(n) { return n.id !== d.id; });
    if (d.techId) activeNodeIds.delete(d.techId);
    var techIds = selectedNodes.map(function(n) { return n.techId; }).filter(Boolean);
    localStorage.setItem('tdm_selected', JSON.stringify(techIds));
    if (selectedNodes.length === 0) {
      clearSelection();
    } else {
      selectedNode = selectedNodes[selectedNodes.length - 1];
      updateVisualsMulti();
      showMultiPopup();
    }
    return;
  }
  selectedNodes.push(d);
  if (d.techId) {
    activeNodeIds.add(d.techId);
    if (!popupNodes.find(function(n) { return n.techId === d.techId; })) {
      popupNodes.push(d);
    }
  }
  selectedNode = d;
  var techIds = selectedNodes.map(function(n) { return n.techId; }).filter(Boolean);
  localStorage.setItem('tdm_selected', JSON.stringify(techIds));
  updateVisualsMulti();
  updateBreadcrumb(d);
  if (selectedNodes.length > 0) showMultiPopup();
}

function selectNodeById(nodeId) {
  var n = nodes.find(function(x) { return x.id === nodeId; });
  if (n) selectNode(n);
}

function clearSelection() {
  selectedNode = null;
  multiSelectedNodes = [];
  activeNodeIds.clear();
  currentSearchQuery = '';
  document.getElementById('searchTech').value = '';
  document.getElementById('searchResults').style.display = 'none';
  document.getElementById('selectionBox').classList.remove('visible');
  updateVisuals();
  document.getElementById('breadcrumb').classList.remove('visible');
}

function updateVisualsMulti() {
  var selectedIds = new Set();
  selectedNodes.forEach(function(sn) {
    selectedIds.add(sn.id);
    sn.ancestors.forEach(function(aid) { selectedIds.add(aid); });
  });
  var hasSelection = selectedIds.size > 0;
  var searchMatchIds = new Set();
  if (currentSearchQuery) {
    nodes.forEach(function(n) {
      if (n.name && n.name.toLowerCase().includes(currentSearchQuery)) {
        searchMatchIds.add(n.id);
      }
    });
  }
  node.each(function(d) {
    var el = d3.select(this);
    var isFiltered = d.filteredOut;
    var isSelected = selectedIds.has(d.id);
    el.classed('filtered-out', isFiltered);
    if (currentSearchQuery) {
      var matchesSearch = searchMatchIds.has(d.id);
      el.classed('highlighted', matchesSearch && !isFiltered);
      el.classed('dimmed', !matchesSearch && !isFiltered);
    } else {
      el.classed('highlighted', isSelected && !isFiltered);
      el.classed('dimmed', hasSelection && !isSelected && !isFiltered);
    }
  });
  link.each(function(l) {
    var el = d3.select(this);
    var srcId = l.source.id !== undefined ? l.source.id : l.source;
    var tgtId = l.target.id !== undefined ? l.target.id : l.target;
    var srcNode = nodes.find(function(n) { return n.id === srcId; });
    var tgtNode = nodes.find(function(n) { return n.id === tgtId; });
    var isFiltered = (srcNode && srcNode.filteredOut) || (tgtNode && tgtNode.filteredOut);
    var isOnPath = selectedIds.has(srcId) && selectedIds.has(tgtId);
    el.classed('filtered-out', isFiltered);
    if (currentSearchQuery) {
      el.classed('dimmed', true);
      el.classed('highlighted', false);
    } else {
      el.classed('highlighted', isOnPath && !isFiltered);
      el.classed('dimmed', hasSelection && !isOnPath && !isFiltered);
    }
  });
}

function updateVisuals() {
  updateVisualsMulti();
}

function updateBreadcrumb(d) {
  var bc = document.getElementById('breadcrumb');
  var pathHtml = d.ancestors.map(function(id) {
    var n = nodes.find(function(x) { return x.id === id; });
    var isCurrent = id === d.id;
    return '<span class="crumb' + (isCurrent ? ' current' : '') + '" onclick="selectNodeById(' + id + ')">' + n.name + '</span>';
  });
  var html = pathHtml.join('<span class="arrow">→</span>');
  if (d.descendantIds.length > 0) {
    var leafCount = d.descendantIds.filter(function(id) {
      var n = nodes.find(function(x) { return x.id === id; });
      return n && n.level === 4 && !n.filteredOut;
    }).length;
    if (leafCount > 0) html += '<span class="descendants">→ ' + leafCount + ' tecnologie</span>';
  }
  bc.innerHTML = html;
  bc.classList.add('visible');
}

function toggleFilters() {
  document.getElementById('filtersPanel').classList.toggle('open');
  document.getElementById('filtersTab').classList.toggle('active');
  setTimeout(function() { updateSize(); fitView(); }, 350);
}

function getActiveFilters() {
  return REQ_LIST.filter(function(r) { var cb = document.getElementById('f_' + r); return cb && cb.checked; });
}

function applyFilters() {
  activeFilters = getActiveFilters();
  nodes.forEach(function(n) { n.filteredOut = false; });
  
  if (activeFilters.length > 0) {
    nodes.forEach(function(n) {
      if (n.level === 4) {
        var passAll = activeFilters.every(function(f) { return n.req.includes(f); });
        n.filteredOut = !passAll;
      }
    });
    for (var lvl = 3; lvl >= 0; lvl--) {
      nodes.filter(function(n) { return n.level === lvl; }).forEach(function(n) {
        var leafDesc = n.descendantIds.filter(function(did) {
          var dn = nodes.find(function(x) { return x.id === did; });
          return dn && dn.level === 4;
        });
        if (leafDesc.length > 0) {
          n.filteredOut = leafDesc.every(function(did) {
            var dn = nodes.find(function(x) { return x.id === did; });
            return dn && dn.filteredOut;
          });
        }
      });
    }
  }
  
  REQ_LIST.forEach(function(r) {
    var count;
    if (activeFilters.length === 0) {
      count = nodes.filter(function(n) { return n.level === 4 && n.req.includes(r); }).length;
    } else {
      var testFilters = activeFilters.slice();
      if (!testFilters.includes(r)) testFilters.push(r);
      count = nodes.filter(function(n) { 
        return n.level === 4 && testFilters.every(function(f) { return n.req.includes(f); });
      }).length;
    }
    var el = document.getElementById('c_' + r);
    if (el) el.textContent = count;
  });
  
  updateActiveFiltersBar();
  updateVisuals();
  if (selectedNode) updateBreadcrumb(selectedNode);
}

function updateActiveFiltersBar() {
  var bar = document.getElementById('activeFilters');
  if (activeFilters.length === 0) { bar.classList.remove('visible'); return; }
  var html = '<span>Filtri attivi:</span>';
  activeFilters.forEach(function(f) {
    html += '<span class="tag">' + f.replace('_', ' ') + ' <span onclick="removeFilter(\'' + f + '\')">✕</span></span>';
  });
  var remaining = nodes.filter(function(n) { return n.level === 4 && !n.filteredOut; }).length;
  html += '<span style="margin-left:auto;color:#4CAF50">' + remaining + ' tecnologie</span>';
  bar.innerHTML = html;
  bar.classList.add('visible');
}

function removeFilter(f) { var cb = document.getElementById('f_' + f); if (cb) cb.checked = false; applyFilters(); }
function resetFilters() { REQ_LIST.forEach(function(r) { var cb = document.getElementById('f_' + r); if (cb) cb.checked = false; }); applyFilters(); }

function ticked() {
  link.attr('d', function(d) {
    var sx = d.source.x, sy = d.source.y, tx = d.target.x, ty = d.target.y;
    return 'M' + sx + ',' + sy + ' C' + (sx+tx)/2 + ',' + sy + ' ' + (sx+tx)/2 + ',' + ty + ' ' + tx + ',' + ty;
  });
  node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
}

function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d3.select(this).classed('fixed', true); savePositions(); }
function releaseAll() { 
  nodes.forEach(function(d) { d.fx = null; d.fy = null; }); 
  node.classed('fixed', false); 
  simulation.alpha(0.01).restart(); // Alpha bassissimo: sblocca ma non sposta

  var positions = nodes.map(function(n) { return {id: n.id, x: n.x, y: n.y, fx: n.fx, fy: n.fy}; });

function loadPositions() {
  var saved = localStorage.getItem('albero_positions_v1');
  if (!saved) return false;
  try {
    var positions = JSON.parse(saved);
    positions.forEach(function(p) {
      var n = nodes.find(function(x) { return x.id === p.id; });
      if (n && p.fx !== null) { n.x = p.x; n.y = p.y; n.fx = p.fx; n.fy = p.fy; }
    });
    node.classed('fixed', function(d) { return d.fx !== null; });
    return true;
  } catch(e) { return false; }
}

function restoreLayout() {
  // Ripristina l'ultimo layout salvato senza ricaricare la pagina
  var saved = localStorage.getItem('albero_positions_v1');
  if (!saved) { 
    alert('Nessun layout salvato da ripristinare'); 
    return; 
  }
  try {
    var positions = JSON.parse(saved);
    positions.forEach(function(p) {
      var n = nodes.find(function(x) { return x.id === p.id; });
      if (n) { 
        n.x = p.x; 
        n.y = p.y; 
        if (p.fx !== null) {
          n.fx = p.fx; 
          n.fy = p.fy;
        } else {
          n.fx = null;
          n.fy = null;
        }
      }
    });
    node.classed('fixed', function(d) { return d.fx !== null; });
    simulation.alpha(0.1).restart();

  }
}

// Sistema di ricerca con dropdown
function handleSearch(query) {
  var results = document.getElementById('searchResults');
  
  if (!query || query.length < 2) {
    results.style.display = 'none';
    results.innerHTML = '';
    return;
  }
  
  var q = query.toLowerCase();
  var matches = [];
  
  nodes.forEach(function(n) {
    if (n.name.toLowerCase().indexOf(q) !== -1 && !n.filteredOut) {
      matches.push(n);
    }
  });
  
  // Ordina per livello poi alfabeticamente
  matches.sort(function(a, b) {
    if (a.level !== b.level) return a.level - b.level;
    return a.name.localeCompare(b.name);
  });
  
  matches = matches.slice(0, 12);
  
  if (matches.length === 0) {
    results.innerHTML = '<div style="padding:0.8rem;text-align:center;color:#888">Nessun risultato</div>';
    results.style.display = 'block';
    return;
  }
  
  var html = '';
  matches.forEach(function(n) {
    var pathText = buildPathText(n);
    var levelColor = n.level === 1 ? '#ff5252' : (n.level === 2 ? '#ffd740' : (n.level === 3 ? '#448aff' : '#4fc3f7'));
    
    html += '<div style="padding:0.6rem 0.8rem;cursor:pointer;border-bottom:1px solid #2a2a4a" ';
    html += 'onmouseover="this.style.background=\'#2a2a4a\'" onmouseout="this.style.background=\'transparent\'" ';
    html += 'onmousedown="selectSearchResult(\'' + n.id + '\')">';
    html += '<div style="color:' + levelColor + ';font-weight:500;font-size:0.85rem">' + n.name + '</div>';
    if (pathText) {
      html += '<div style="font-size:0.65rem;color:#666;margin-top:2px">' + pathText + '</div>';
    }
    html += '</div>';
  });
  
  results.innerHTML = html;
  results.style.display = 'block';
}

function buildPathText(n) {
  if (n.level === 0) return '';
  var parts = [];
  var ancestorsCopy = n.ancestors.slice().reverse();
  ancestorsCopy.forEach(function(ancId) {
    var anc = nodes.find(function(x) { return x.id === ancId; });
    if (anc && anc.level > 0) {
      parts.push(anc.name);
    }
  });
  return parts.join(' › ');
}

function fitView() {
  var bbox = g.node().getBBox();
  var pad = 50;
  var scale = Math.min((width - pad*2) / bbox.width, (height - pad*2) / bbox.height, 0.9);
  var tx = (width - bbox.width * scale) / 2 - bbox.x * scale;
  var ty = (height - bbox.height * scale) / 2 - bbox.y * scale;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function showMultiPopup() {
  var popup = document.getElementById('selectionBox');
  if (!popup) return;
  var seen = {};
  var uniquePopupNodes = popupNodes.filter(function(n) {
    if (!n.techId || seen[n.techId]) return false;
    seen[n.techId] = true;
    return true;
  });
  if (uniquePopupNodes.length === 0) { hideMultiPopup(); return; }
  var activeTechIds = selectedNodes.map(function(n) { return n.techId; });
  var activeCount = [...new Set(activeTechIds.filter(Boolean))].length;
  var html = '<span class="close" onclick="hideMultiPopup()">&times;</span>';
  html += '<div style="font-weight:bold;margin-bottom:10px;color:#4fc3f7;">' + activeCount + ' di ' + uniquePopupNodes.length + ' selezionate</div>';
  html += '<div style="max-height:300px;overflow-y:auto;">';
  uniquePopupNodes.forEach(function(tn) {
    var info = fullData.find(function(t) { return t.id === tn.techId; });
    var nome = info ? info.nome : tn.name;
    var isActive = activeTechIds.indexOf(tn.techId) >= 0;
    html += '<label style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;">';
    html += '<input type="checkbox" ' + (isActive ? 'checked' : '') + ' onchange="toggleMultiNode(' + tn.techId + ',this.checked)" style="margin-right:10px;">';
    html += '<span style="color:' + (isActive ? '#ccc' : '#666') + ';">' + nome + '</span></label>';
  });
  html += '</div>';
  popup.innerHTML = html;
  popup.classList.add('visible');
}

function hideMultiPopup() {
  var sb = document.getElementById('selectionBox');
  if (sb) sb.classList.remove('visible');
}

function toggleMultiNode(techId, checked) {
  if (checked) {
    popupNodes.forEach(function(pn) {
      if (pn.techId === techId && selectedNodes.indexOf(pn) === -1) {
        selectedNodes.push(pn);
        activeNodeIds.add(techId);
      }
    });
  } else {
    selectedNodes = selectedNodes.filter(function(n) { return n.techId !== techId; });
    activeNodeIds.delete(techId);
  }
  var techIds = [...new Set(selectedNodes.map(function(n) { return n.techId; }).filter(Boolean))];
  localStorage.setItem('tdm_selected', JSON.stringify(techIds));
  if (selectedNodes.length === 0) {
    clearSelection();
  } else {
    updateVisualsMulti();
  }
  showMultiPopup();
}

function fitSelection() {
  if (!selectedNode) { fitView(); return; }
  var allPathIds = selectedNode.ancestors.concat(selectedNode.descendantIds);
  var selectedNodes = nodes.filter(function(n) { return allPathIds.includes(n.id) && !n.filteredOut; });
  if (selectedNodes.length === 0) { fitView(); return; }
  var minX = d3.min(selectedNodes, function(n) { return n.x - SIZES[n.level].w/2; });
  var maxX = d3.max(selectedNodes, function(n) { return n.x + SIZES[n.level].w/2; });
  var minY = d3.min(selectedNodes, function(n) { return n.y - SIZES[n.level].h/2; });
  var maxY = d3.max(selectedNodes, function(n) { return n.y + SIZES[n.level].h/2; });
  var bw = maxX - minX, bh = maxY - minY, pad = 80;
  var scale = Math.min((width - pad*2) / bw, (height - pad*2) / bh, 1.3);
  var tx = (width - bw * scale) / 2 - minX * scale;
  var ty = (height - bh * scale) / 2 - minY * scale;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function reheat() { simulation.alpha(0.8).restart(); }

svg.on('click', function() { clearSelection(); closePopup(); });

var hadSavedPositions = loadPositions();
if (hadSavedPositions) {
  simulation.alpha(0.1).restart();
  setTimeout(fitView, 500);
} else {
  setTimeout(fitView, 2500);
}

// Supporto URL parameter ?tech=ID per evidenziare tecnologia
// === MULTI-SELEZIONE ===
function saveSelectionToStorage() {
  var techIds = multiSelectedNodes.filter(function(n) { return activeNodeIds.has(n.techId); }).map(function(n) { return n.techId; });
  localStorage.setItem('tdm_selected', JSON.stringify(techIds));
}

function addToMultiSelection(d) {
  if (!d.techId) return;
  var idx = multiSelectedNodes.findIndex(function(n) { return n.id === d.id; });
  if (idx >= 0) {
    if (activeNodeIds.has(d.techId)) { activeNodeIds.delete(d.techId); } else { activeNodeIds.add(d.techId); }
  } else {
    multiSelectedNodes.push(d);
    activeNodeIds.add(d.techId);
  }
  saveSelectionToStorage();
  updateMultiSelectionDisplay();
}

function updateMultiSelectionDisplay() {
  updateVisualsMulti();
  if (multiSelectedNodes.length > 0) { showMultiPopup(multiSelectedNodes); } else { hideMultiPopup(); }
}

function updateVisualsMulti() {
  var activePaths = new Set();
  multiSelectedNodes.forEach(function(sn) {
    if (activeNodeIds.has(sn.techId)) {
      sn.ancestors.forEach(function(aid) { activePaths.add(aid); });
      activePaths.add(sn.id);
    }
  });
  var hasActive = activePaths.size > 0;
  node.each(function(d) {
    var el = d3.select(this);
    var isFiltered = d.filteredOut;
    var isOnPath = !hasActive || activePaths.has(d.id);
    el.classed('filtered-out', isFiltered);
    el.classed('highlighted', hasActive && activePaths.has(d.id) && !isFiltered);
    el.classed('dimmed', hasActive && !activePaths.has(d.id) && !isFiltered);
  });
  link.each(function(l) {
    var el = d3.select(this);
    var srcId = l.source.id !== undefined ? l.source.id : l.source;
    var tgtId = l.target.id !== undefined ? l.target.id : l.target;
    var srcNode = nodes.find(function(n) { return n.id === srcId; });
    var tgtNode = nodes.find(function(n) { return n.id === tgtId; });
    var isFiltered = srcNode.filteredOut || tgtNode.filteredOut;
    var isOnPath = hasActive && activePaths.has(srcId) && activePaths.has(tgtId);
    el.classed('filtered-out', isFiltered);
    el.classed('highlighted', isOnPath && !isFiltered);
    el.classed('dimmed', hasActive && !isOnPath && !isFiltered);
  });
}

function showMultiPopup(targetNodes) {
  var popup = document.getElementById('selectionBox');
  var activeCount = targetNodes.filter(function(tn) { return activeNodeIds.has(tn.techId); }).length;
  var html = '<span class="close" onclick="hideMultiPopup()">&times;</span>';
  html += '<div style="font-weight:bold;margin-bottom:10px;color:#4fc3f7;">' + activeCount + '/' + targetNodes.length + ' tecnologie attive</div>';
  html += '<div style="max-height:300px;overflow-y:auto;">';
  targetNodes.forEach(function(tn) {
    var info = techInfo[tn.techId];
    if (info) {
      var isActive = activeNodeIds.has(tn.techId);
      var checkedAttr = isActive ? 'checked' : '';
      var textColor = isActive ? '#ccc' : '#666';
      html += '<label style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;">';
      html += '<input type="checkbox" ' + checkedAttr + ' onchange="toggleMultiNode(' + tn.techId + ',this.checked)" style="margin-right:10px;">';
      html += '<span style="color:' + textColor + ';">' + info.nome + '</span></label>';
    }
  });
  html += '</div>';
  popup.innerHTML = html;
  popup.classList.add('visible');
}

function hideMultiPopup() {
  document.getElementById('selectionBox').classList.remove('visible');
  multiSelectedNodes = [];
  activeNodeIds.clear();
  localStorage.removeItem('tdm_selected');
  updateVisuals();
}

function toggleMultiNode(techId, checked) {
  if (checked) { activeNodeIds.add(techId); } else { activeNodeIds.delete(techId); }
  saveSelectionToStorage();
  updateVisualsMulti();
  showMultiPopup(multiSelectedNodes);
}

function checkUrlParam() {
  var params = new URLSearchParams(window.location.search);
  var techParam = params.get('tech');
  var techIds = [];
  if (techParam) {
    techIds = techParam.split(',').map(function(s) { return parseInt(s.trim()); }).filter(function(n) { return !isNaN(n); });
  } else {
    try {
      var savedSel = localStorage.getItem('tdm_selected');
      if (savedSel) techIds = JSON.parse(savedSel);
    } catch(e) {}
  }
  if (!Array.isArray(techIds) || techIds.length === 0) return;
  techIds.forEach(function(tid) {
    var techNode = nodes.find(function(n) { return n.techId === tid; });
    if (techNode && !selectedNodes.find(function(s) { return s.id === techNode.id; })) {
      selectedNodes.push(techNode);
      popupNodes.push(techNode);
      activeNodeIds.add(tid);
    }
  });
  if (selectedNodes.length === 0) return;
  selectedNode = selectedNodes[selectedNodes.length - 1];
  updateVisualsMulti();
  setTimeout(function() {
    var allPathIds = new Set();
    selectedNodes.forEach(function(sn) {
      sn.ancestors.forEach(function(aid) { allPathIds.add(aid); });
      allPathIds.add(sn.id);
    });
    var pathNodes = nodes.filter(function(n) { return allPathIds.has(n.id); });
    if (pathNodes.length === 0) return;
    var minX = d3.min(pathNodes, function(n) { return n.x; }) - 80;
    var maxX = d3.max(pathNodes, function(n) { return n.x; }) + 80;
    var minY = d3.min(pathNodes, function(n) { return n.y; }) - 80;
    var maxY = d3.max(pathNodes, function(n) { return n.y; }) + 80;
    var bw = maxX - minX, bh = maxY - minY;
    var scale = Math.min(width / bw, height / bh, 1.5);
    scale = Math.max(scale, 0.4);
    var tx = width/2 - (minX + bw/2) * scale;
    var ty = height/2 - (minY + bh/2) * scale;
    svg.transition().duration(800).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
    setTimeout(function() {
      if (selectedNodes.length > 1) showMultiPopup();
      else if (selectedNodes.length === 1) showPopupForNode(selectedNodes[0]);
    }, 900);
  }, 1200);
}

function showPopupForNode(d) {
  if (d.level === 4 && d.techId) {
    var info = techInfo[d.techId];
    if (!info) return;
    currentTechId = d.techId;
    document.getElementById('popupTitle').textContent = info.nome;
    document.getElementById('popupCat').textContent = info.cat;
    document.getElementById('popupCat').style.background = {'TAGLIARE':'#C62828','PIEGARE':'#6A1B9A','SCAVARE':'#283593','CONFORMARE':'#00695C','FONDERE':'#E65100','STAMPARE_POLIMERI':'#1565C0','UNIRE':'#4E342E','PROTEGGERE':'#37474F','ADDITIVE':'#00838F','DECORARE':'#AD1457'}[info.cat] || '#666';
    document.getElementById('popupDesc').textContent = info.desc;
    document.getElementById('popupMat').innerHTML = '<strong>Materiali:</strong> ' + info.mat;
    var reqHtml = '';
    if (info.req) info.req.forEach(function(r) { reqHtml += '<span class="req-tag">' + r.replace('_', ' ') + '</span>'; });
    document.getElementById('popupReqs').innerHTML = reqHtml;
    var popup = document.getElementById('techPopup');
    popup.style.left = '50%';
    popup.style.top = '120px';
    popup.style.transform = 'translateX(-50%)';
    popup.classList.add('visible');
  }
}

checkUrlParam();

window.addEventListener('resize', function() { updateSize(); });
</script>
