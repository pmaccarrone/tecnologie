<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mappa da Materiali - Tecnologia dei Materiali</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12}
body{font-family:system-ui,sans-serif;color:#fff;display:flex;flex-direction:column}

.header{padding:0.4rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.1);flex-shrink:0}
.header-left{display:flex;align-items:center;gap:0.8rem}
.header h1{font-size:1.2rem;color:#f9a825}
.header .version{background:#ff980022;color:#ff9800;padding:0.15rem 0.4rem;border-radius:4px;font-size:0.6rem;font-weight:600}
.header p{color:#888;font-size:0.75rem;line-height:1.3}
.header-right{display:flex;align-items:center;gap:0.3rem}
.btn{background:#1a1a2e;border:1px solid #333;color:#fff;padding:0.3rem 0.6rem;border-radius:4px;cursor:pointer;font-size:0.65rem;text-decoration:none;display:inline-flex;align-items:center;gap:0.3rem}
.btn:hover{border-color:#f9a825;color:#f9a825}
.btn.active{background:#f9a825;color:#000}
.btn-group{display:flex;gap:0.2rem;margin:0 0.3rem}
.btn-rows{display:flex;flex-direction:column;gap:0.25rem}
.btn-row{display:flex;gap:0.2rem;justify-content:flex-end}
.btn-nav{background:#2a2a4a;color:#fff;padding:0.4rem 0.8rem}
.btn-home{border:2px solid #fff;color:#fff}
.btn-home:hover{background:#ffffff33}
.btn-db{border:2px solid #ffa726;color:#ffa726}
.btn-db:hover{background:#ffa72633}
.btn-mf{border:2px solid #ef5350;color:#ef5350}
.btn-mf:hover{background:#ef535033}
.btn-mm{border:2px solid #66bb6a;color:#66bb6a;opacity:0.5;pointer-events:none}
.btn-mt{border:2px solid #ab47bc;color:#ab47bc}
.btn-mt:hover{background:#ab47bc33}

.main{flex:1;display:flex;overflow:hidden;position:relative}
#tree{flex:1;display:block}

/* Search */
.search-container{position:relative;margin-right:0.5rem}
.search-input{background:#1a1a2e;border:1px solid #333;color:#fff;padding:0.3rem 0.6rem;border-radius:4px;font-size:0.7rem;width:180px}
.search-input:focus{outline:none;border-color:#f9a825}
.search-input::placeholder{color:#666}
.search-results{position:absolute;top:100%;left:0;width:280px;max-height:300px;overflow-y:auto;background:#1a1a2e;border:1px solid #f9a825;border-top:none;border-radius:0 0 8px 8px;z-index:1000;display:none}
.search-results.visible{display:block}
.search-item{padding:0.5rem 0.8rem;cursor:pointer;border-bottom:1px solid #2a2a4a;font-size:0.75rem}
.search-item:hover{background:#2a2a4a}
.search-item:last-child{border-bottom:none}
.search-item .item-name{color:#f9a825;font-weight:500}
.search-item .item-path{color:#666;font-size:0.65rem;margin-top:0.2rem}

.counter{background:#1a1a2e;border:1px solid #333;padding:0.3rem 0.6rem;border-radius:4px;font-size:0.65rem;color:#888}
.counter span{color:#f9a825;font-weight:600}

/* Filtri panel */
.filters-panel{width:0;overflow:hidden;background:#12121f;border-left:1px solid #333;transition:width 0.3s;flex-shrink:0}
.filters-panel.open{width:240px}
.filters-tab{position:fixed;right:0;top:70px;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;padding:0.8rem 0.4rem;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;font-size:0.75rem;color:#888;z-index:50;transition:all 0.2s}
.filters-tab:hover{background:#1a1a2e;color:#f9a825;border-color:#f9a825}
.filters-tab.active{background:#f9a825;color:#000;border-color:#f9a825;right:240px}
.filters-inner{width:240px;padding:1rem;height:100%;overflow-y:auto}
.filters-title{font-size:0.85rem;color:#f9a825;margin-bottom:0.8rem;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.filter-group{margin-bottom:1rem}
.filter-group-title{font-size:0.7rem;color:#888;text-transform:uppercase;margin-bottom:0.4rem;letter-spacing:0.5px;display:flex;justify-content:space-between;align-items:center}
.filter-group-title input{accent-color:#f9a825;cursor:pointer}
.filter-item{display:flex;align-items:center;padding:0.25rem 0;cursor:pointer}
.filter-item:hover{background:rgba(255,255,255,0.05);margin:0 -0.5rem;padding:0.25rem 0.5rem;border-radius:4px}
.filter-item input{margin-right:0.5rem;accent-color:#f9a825}
.filter-item label{font-size:0.75rem;cursor:pointer;flex:1}
.filter-item .count{font-size:0.65rem;color:#666}
.filter-reset{margin-top:1rem;width:100%;padding:0.5rem;background:#1a1a2e;border:1px solid #333;color:#888;border-radius:4px;cursor:pointer;font-size:0.75rem}
.filter-reset:hover{border-color:#f9a825;color:#f9a825}

/* Filtri attivi */
.active-filters{padding:0.4rem 1rem;background:#1a1a2e;border-bottom:1px solid #333;font-size:0.75rem;color:#888;display:none}
.active-filters.visible{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.active-filters .tag{background:#f9a82533;color:#f9a825;padding:0.2rem 0.5rem;border-radius:4px;display:flex;align-items:center;gap:0.3rem}

/* Legenda */
.legend-tab{position:fixed;right:0;top:160px;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;padding:0.8rem 0.4rem;cursor:pointer;writing-mode:vertical-rl;text-orientation:mixed;font-size:0.75rem;color:#888;z-index:50;transition:all 0.2s}
.legend-tab:hover{background:#1a1a2e;color:#f9a825;border-color:#f9a825}
.legend-tab.active{background:#f9a825;color:#000;border-color:#f9a825;right:200px}
.legend-panel{position:fixed;right:0;top:160px;width:0;height:auto;max-height:70vh;overflow:hidden;background:#12121f;border:1px solid #333;border-right:none;border-radius:8px 0 0 8px;transition:width 0.3s;z-index:49}
.legend-panel.open{width:200px;overflow-y:auto}
.legend-inner{width:200px;padding:0.8rem}
.legend-section{margin-bottom:0.8rem}
.legend-section-title{font-size:0.7rem;color:#f9a825;margin-bottom:0.4rem;font-weight:600}
.legend-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.25rem;font-size:0.65rem}
.legend-color{width:12px;height:12px;border-radius:3px}
.legend-color.circle{border-radius:50%}

/* Links e nodi */
.link{stroke:#4a4a6a;stroke-width:2.5;fill:none;transition:all 0.3s}
.link.dimmed{stroke:#2a2a3a;stroke-width:1.5;opacity:0.4}
.link.highlighted{stroke:#f9a825;stroke-width:5}
.link.filtered-out{stroke:#1a1a2a;stroke-width:1;opacity:0.15}

.node{cursor:pointer;transition:opacity 0.3s}
.node text{pointer-events:none;fill:#fff}
.node.dimmed{opacity:0.35}
.node.highlighted rect,.node.highlighted circle{stroke:#f9a825;stroke-width:5;filter:drop-shadow(0 0 10px #f9a825)}
.node.filtered-out{opacity:0.1}

/* L0: Root - cerchio giallo/oro */
.L0 circle{fill:#f9a825;stroke:#f9a825;stroke-width:3}
.L0 text{fill:#000;font-weight:bold}

/* L1: Materiale - colori specifici per materiale */
.L1 rect{stroke-width:2;rx:6}
.L1 text{fill:#fff;font-weight:600}
.L1.mat-Metalli rect{fill:#5c6bc0;stroke:#5c6bc0}
.L1.mat-Polimeri rect{fill:#26a69a;stroke:#26a69a}
.L1.mat-Legno rect{fill:#8d6e63;stroke:#8d6e63}
.L1.mat-Vetro rect{fill:#4fc3f7;stroke:#4fc3f7}
.L1.mat-Ceramici rect{fill:#ff8a65;stroke:#ff8a65}
.L1.mat-Compositi rect{fill:#9575cd;stroke:#9575cd}

/* L2: Categoria - colori specifici per categoria */
.L2 rect{stroke-width:2;rx:5}
.L2 text{fill:#fff;font-weight:500;font-size:0.7rem}
.L2.cat-TAGLIARE rect{fill:#c62828;stroke:#c62828}
.L2.cat-PIEGARE rect{fill:#ad1457;stroke:#ad1457}
.L2.cat-SCAVARE rect{fill:#6a1b9a;stroke:#6a1b9a}
.L2.cat-CONFORMARE rect{fill:#283593;stroke:#283593}
.L2.cat-FONDERE rect{fill:#00695c;stroke:#00695c}
.L2.cat-STAMPARE_POLIMERI rect{fill:#2e7d32;stroke:#2e7d32}
.L2.cat-UNIRE rect{fill:#f57f17;stroke:#f57f17}
.L2.cat-PROTEGGERE rect{fill:#4e342e;stroke:#4e342e}
.L2.cat-ADDITIVE rect{fill:#0277bd;stroke:#0277bd}
.L2.cat-DECORARE rect{fill:#7b1fa2;stroke:#7b1fa2}

/* L3: Tecnologia - fondino nero, bordo celeste */
.L3 rect{fill:#0d1117;stroke:#4fc3f7;stroke-width:2;rx:4}
.L3 text{fill:#4fc3f7;font-size:0.7rem}

/* L4: Forma - grigio scuro, bordo grigio chiaro */
.L4 rect{fill:#1a1a2e;stroke:#888;stroke-width:1.5;rx:3}
.L4 text{fill:#aaa;font-size:0.65rem}

/* Nodi fissati (trascinati) */
.node.fixed circle,.node.fixed rect{stroke:#fff!important;stroke-width:3!important}

/* Breadcrumb */
.breadcrumb{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a2e;border:1px solid #333;padding:0.5rem 1rem;border-radius:8px;font-size:0.8rem;display:none;z-index:100}
.breadcrumb.visible{display:flex;align-items:center;gap:0.5rem}
.breadcrumb .crumb{color:#888;cursor:pointer}
.breadcrumb .crumb:hover{color:#f9a825}
.breadcrumb .crumb.current{color:#f9a825;font-weight:600}
.breadcrumb .arrow{color:#444}
.breadcrumb .descendants{color:#4CAF50;margin-left:0.5rem}

/* Tooltip */
.node-tooltip{position:fixed;background:#1a1a2e;border:1px solid #f9a825;border-radius:8px;padding:0.8rem;max-width:280px;z-index:1000;pointer-events:none;display:none}
.node-tooltip.visible{display:block}
.node-tooltip .tt-name{color:#f9a825;font-weight:600;font-size:0.85rem;margin-bottom:0.3rem}
.node-tooltip .tt-cat{display:inline-block;padding:0.1rem 0.4rem;border-radius:3px;font-size:0.6rem;color:#fff;margin-bottom:0.3rem}
.node-tooltip .tt-path{color:#888;font-size:0.65rem;margin-bottom:0.4rem}
.node-tooltip .tt-desc{color:#ccc;font-size:0.7rem;line-height:1.3}
.node-tooltip .tt-count{color:#4CAF50;font-size:0.7rem;margin-top:0.3rem}

/* Dialog trasferimento selezioni */
.transfer-dialog{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
.transfer-dialog.visible{display:flex}
.transfer-content{background:#1a1a2e;border:2px solid #4fc3f7;border-radius:12px;padding:1.5rem;max-width:400px;text-align:center}
.transfer-content h3{color:#4fc3f7;margin-bottom:1rem;font-size:1.1rem}
.transfer-content p{color:#ccc;margin-bottom:1.5rem;line-height:1.5}
.transfer-buttons{display:flex;gap:1rem;justify-content:center}
.transfer-btn{padding:0.6rem 1.2rem;border:none;border-radius:6px;font-size:0.9rem;font-weight:600;cursor:pointer;transition:all 0.2s}
.transfer-btn.yes{background:linear-gradient(135deg,#4fc3f7,#2196F3);color:#fff}
.transfer-btn.yes:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,195,247,0.4)}
.transfer-btn.no{background:#37474F;color:#fff}
.transfer-btn.no:hover{background:#455A64;transform:translateY(-2px)}

/* Popup multi-selezione */
.tech-popup{position:fixed;background:#1a1a2e;border:2px solid #4fc3f7;border-radius:10px;padding:1rem;max-width:350px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);display:none;backdrop-filter:blur(5px)}
.tech-popup.visible{display:block}
.tech-popup .close{position:absolute;top:8px;right:12px;cursor:pointer;color:#888;font-size:1.2rem}
.tech-popup .close:hover{color:#fff}
.tech-popup h3{color:#4fc3f7;font-size:1rem;margin-bottom:0.5rem;padding-right:1.5rem}
.tech-popup .cat{display:inline-block;padding:0.15rem 0.5rem;border-radius:4px;font-size:0.7rem;margin-bottom:0.5rem;color:#fff}
.tech-popup .info{font-size:0.75rem;color:#aaa;margin-bottom:0.5rem}
.tech-popup .info strong{color:#ccc}
.tech-popup .btn-open{width:100%;padding:0.5rem;background:linear-gradient(135deg,#00695C,#00897B);color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:0.8rem;font-weight:600;transition:all 0.2s;margin-top:0.5rem}
.tech-popup .btn-open:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,105,92,0.4)}

/* Confirm Dialog Custom */
.confirm-dialog{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center;z-index:400;backdrop-filter:blur(3px)}
.confirm-dialog.visible{display:flex}
.confirm-content{background:#1a1a2e;border:2px solid #00d4ff;border-radius:12px;padding:2rem;text-align:center;max-width:400px}
.confirm-content h3{color:#00d4ff;font-size:1.3rem;margin-bottom:0.8rem}
.confirm-content p{color:#aaa;font-size:1rem;margin-bottom:1.5rem}
.confirm-buttons{display:flex;gap:1rem;justify-content:center}
.confirm-btn{padding:0.7rem 1.5rem;border-radius:6px;font-size:0.95rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s}
.confirm-btn.keep{background:#00d4ff;color:#000}
.confirm-btn.keep:hover{background:#33e0ff}
.confirm-btn.clear{background:#4a5568;color:#fff}
.confirm-btn.clear:hover{background:#5a6578}
</style>
</head>
<body>

<div class="confirm-dialog" id="confirmDialog">
  <div class="confirm-content">
    <h3>Deselezionare tutto?</h3>
    <p id="confirmMessage">Hai 0 tecnologie selezionate.</p>
    <div class="confirm-buttons">
      <button class="confirm-btn keep" onclick="closeConfirmDialog()">Mantieni selezione</button>
      <button class="confirm-btn clear" onclick="confirmClearSelection()">Deseleziona tutto</button>
    </div>
  </div>
</div>

<div class="transfer-dialog" id="transferDialog">
  <div class="transfer-content">
    <h3>Selezioni attive</h3>
    <p id="transferMessage"></p>
    <div class="transfer-buttons">
      <button class="transfer-btn yes" onclick="transferKeep()">Sì, mantieni selezioni</button>
      <button class="transfer-btn no" onclick="transferClear()">No, vai alla mappa pulita</button>
    </div>
  </div>
</div>

<div class="header" style="padding:0.3rem 1rem;display:flex;align-items:center;justify-content:flex-end;gap:0.4rem;flex-wrap:nowrap;overflow-x:auto">
  <div class="search-container" style="margin-right:auto">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 Cerca tecnologia...">
    <div class="search-results" id="searchResults"></div>
  </div>
  <div class="counter" style="font-size:0.7rem;white-space:nowrap">Tecnologie: <span id="techCount">0</span></div>
  <button class="btn" id="fitAll" title="Visualizza tutta la mappa">Fit tutto</button>
  <button class="btn" id="fitSel" title="Centra sulla selezione">Fit selez.</button>
  <button class="btn" id="sblocca" title="Libera i nodi fissati">Sblocca</button>
  <button class="btn" id="ripristina" title="Torna all'ultimo backup">Ripristina</button>
  <button class="btn" id="reset" title="Riorganizza mantenendo backup">Reset</button>
  <button class="btn" id="riordina" title="Ricalcola layout ottimale">Riordina</button>
</div>
<div class="main">
  <svg id="tree"></svg>
  
  <div class="tech-popup" id="techPopup">
    <span class="close" onclick="closePopup()">X</span>
    <h3 id="popupTitle"></h3>
    <div class="cat" id="popupCat"></div>
    <div class="info" id="popupInfo"></div>
    <button class="btn-open" onclick="openFullCard()">[+] Apri scheda completa nel Database</button>
  </div>
  
  <div class="tech-popup" id="selectionBox" style="left:20px;top:100px;"></div>
  
  <div class="filters-panel" id="filtersPanel">
    <div class="filters-inner">
      <div class="filters-title">Filtri <span id="closeFilters">x</span></div>
      
      <div class="filter-group">
        <div class="filter-group-title">Materiale <input type="checkbox" id="f_mat_all" checked title="Seleziona/Deseleziona tutti"></div>
        <div class="filter-item"><input type="checkbox" id="f_metalli" checked><label for="f_metalli">Metalli</label></div>
        <div class="filter-item"><input type="checkbox" id="f_polimeri" checked><label for="f_polimeri">Polimeri</label></div>
        <div class="filter-item"><input type="checkbox" id="f_legno" checked><label for="f_legno">Legno</label></div>
        <div class="filter-item"><input type="checkbox" id="f_vetro" checked><label for="f_vetro">Vetro</label></div>
        <div class="filter-item"><input type="checkbox" id="f_ceramici" checked><label for="f_ceramici">Ceramici</label></div>
        <div class="filter-item"><input type="checkbox" id="f_compositi" checked><label for="f_compositi">Compositi</label></div>
      </div>
      
      <div class="filter-group">
        <div class="filter-group-title">Categoria <input type="checkbox" id="f_cat_all" checked title="Seleziona/Deseleziona tutti"></div>
        <div class="filter-item"><input type="checkbox" id="f_tagliare" checked><label for="f_tagliare">Tagliare</label></div>
        <div class="filter-item"><input type="checkbox" id="f_piegare" checked><label for="f_piegare">Piegare</label></div>
        <div class="filter-item"><input type="checkbox" id="f_scavare" checked><label for="f_scavare">Scavare</label></div>
        <div class="filter-item"><input type="checkbox" id="f_conformare" checked><label for="f_conformare">Conformare</label></div>
        <div class="filter-item"><input type="checkbox" id="f_fondere" checked><label for="f_fondere">Fondere</label></div>
        <div class="filter-item"><input type="checkbox" id="f_stampare_polimeri" checked><label for="f_stampare_polimeri">Stampare Polimeri</label></div>
        <div class="filter-item"><input type="checkbox" id="f_unire" checked><label for="f_unire">Unire</label></div>
        <div class="filter-item"><input type="checkbox" id="f_proteggere" checked><label for="f_proteggere">Proteggere</label></div>
        <div class="filter-item"><input type="checkbox" id="f_additive" checked><label for="f_additive">Additive</label></div>
        <div class="filter-item"><input type="checkbox" id="f_decorare" checked><label for="f_decorare">Decorare</label></div>
      </div>
      
      <div class="filter-group">
        <div class="filter-group-title">Classificazione <input type="checkbox" id="f_class_all" checked title="Seleziona/Deseleziona tutti"></div>
        <div class="filter-item"><input type="checkbox" id="f_sottrazione" checked><label for="f_sottrazione">Sottrazione</label></div>
        <div class="filter-item"><input type="checkbox" id="f_conservazione" checked><label for="f_conservazione">Conservazione</label></div>
        <div class="filter-item"><input type="checkbox" id="f_incremento" checked><label for="f_incremento">Incremento</label></div>
        <div class="filter-item"><input type="checkbox" id="f_trattamento" checked><label for="f_trattamento">Trattamento</label></div>
      </div>
      
      <button class="filter-reset" id="resetFilters">Reset filtri</button>
    </div>
  </div>
</div>

<div class="filters-tab" id="filtersTab">Filtri</div>

<div class="legend-tab" id="legendTab">Livelli</div>
<div class="legend-panel" id="legendPanel">
  <div class="legend-inner">
    <div class="legend-section">
      <div class="legend-section-title">Profondita <input type="checkbox" id="depth_all" checked title="Tutti"></div>
      <div class="legend-item"><input type="checkbox" id="depth_0" checked><div class="legend-color circle" style="background:#f9a825"></div> Root</div>
      <div class="legend-item"><input type="checkbox" id="depth_1" checked><div class="legend-color" style="background:#5c6bc0"></div> Materiale</div>
      <div class="legend-item"><input type="checkbox" id="depth_2" checked><div class="legend-color" style="background:#c62828"></div> Categoria</div>
      <div class="legend-item"><input type="checkbox" id="depth_3" checked><div class="legend-color" style="background:#0d1117;border:2px solid #4fc3f7"></div> Tecnologia</div>
      <div class="legend-item"><input type="checkbox" id="depth_4" checked><div class="legend-color" style="background:#1a1a2e;border:1px solid #888"></div> Forma</div>
    </div>
  </div>
</div>

<div class="breadcrumb" id="breadcrumb"></div>
<div class="node-tooltip" id="nodeTooltip"></div>

<script>
// Colori materiali
var MAT_COLORS = {
  'Metalli': '#5c6bc0',
  'Polimeri': '#26a69a',
  'Legno': '#8d6e63',
  'Vetro': '#4fc3f7',
  'Ceramici': '#ff8a65',
  'Compositi': '#9575cd'
};

// Colori categorie
var CAT_COLORS = {
  'TAGLIARE': '#c62828',
  'PIEGARE': '#ad1457',
  'SCAVARE': '#6a1b9a',
  'CONFORMARE': '#283593',
  'FONDERE': '#00695c',
  'STAMPARE_POLIMERI': '#2e7d32',
  'UNIRE': '#f57f17',
  'PROTEGGERE': '#4e342e',
  'ADDITIVE': '#0277bd',
  'DECORARE': '#7b1fa2'
};

// Mapping categoria -> classificazione
var CAT_TO_CLASS = {
  'TAGLIARE': 'Sottrazione',
  'PIEGARE': 'Conservazione',
  'SCAVARE': 'Sottrazione',
  'CONFORMARE': 'Conservazione',
  'FONDERE': 'Incremento',
  'STAMPARE_POLIMERI': 'Incremento',
  'UNIRE': 'Trattamento',
  'PROTEGGERE': 'Trattamento',
  'ADDITIVE': 'Incremento',

};// Costruisci albero M-C-T-F (Materiale -> Categoria -> Tecnologia -> Forma)
function buildTree() {
  var root = {name: 'Materiali', level: 0, children: []};
  var materials = ['Metalli', 'Polimeri', 'Legno', 'Vetro', 'Ceramici', 'Compositi'];
  
  materials.forEach(function(mat) {
    var matNode = {name: mat, level: 1, mat: mat, children: []};
    
    // Raggruppa tecnologie per categoria per questo materiale
    var catGroups = {};
    
    Object.keys(techInfo).forEach(function(tid) {
      var t = techInfo[tid];
      if (t.materials.includes(mat)) {
        var cat = t.cat;
        if (!catGroups[cat]) {
          catGroups[cat] = [];
        }
        catGroups[cat].push({tid: parseInt(tid), tech: t});
      }
    });
    
    // Ordine categorie
    var catOrder = ['TAGLIARE', 'PIEGARE', 'SCAVARE', 'CONFORMARE', 'FONDERE', 'STAMPARE_POLIMERI', 'UNIRE', 'PROTEGGERE', 'ADDITIVE', 'DECORARE'];
    
    catOrder.forEach(function(cat) {
      if (catGroups[cat] && catGroups[cat].length > 0) {
        var catNode = {
          name: cat.replace('_', ' '),
          level: 2,
          mat: mat,
          cat: cat,
          cl: CAT_TO_CLASS[cat],
          children: []
        };
        
        catGroups[cat].forEach(function(item) {
          var techNode = {
            name: item.tech.name,
            level: 3,
            techId: item.tid,
            mat: mat,
            cat: cat,
            cl: item.tech.cl || CAT_TO_CLASS[cat],
            children: []
          };
          
          // Aggiungi forme
          item.tech.forms.forEach(function(f) {
            techNode.children.push({name: f, level: 4, mat: mat, cat: cat});
          });
          
          catNode.children.push(techNode);
        });
        
        matNode.children.push(catNode);
      }
    });
    
    if (matNode.children.length > 0) {
      root.children.push(matNode);
    }
  });
  
  return root;
}

var treeData = buildTree();

// Flatten tree
var nodes = [];
var links = [];
var nodeId = 0;

function flatten(node, parent, ancestors) {
  var id = nodeId++;
  var anc = ancestors.concat([id]);
  var n = {
    id: id,
    name: node.name,
    level: node.level,
    mat: node.mat || null,
    cat: node.cat || null,
    cl: node.cl || null,
    techId: node.techId || null,
    parentId: parent ? parent.id : null,
    ancestors: anc,
    descendantIds: [],
    x: width / 2 + (Math.random() - 0.5) * 200,
    y: height / 2 + (Math.random() - 0.5) * 200
  };
  nodes.push(n);
  
  if (parent) {
    links.push({source: parent.id, target: id});
    ancestors.forEach(function(ancId) {
      var ancNode = nodes.find(function(x) { return x.id === ancId; });
      if (ancNode) ancNode.descendantIds.push(id);
    });
  }
  
  if (node.children) {
    node.children.forEach(function(c) { flatten(c, n, anc); });
  }
}

// Selezione singola
// Nodo attualmente selezionato sulla mappa (singolo, separato da selectedNodes)
// Selezione unificata tramite selectedNodes + activeNodeIds

function selectNode(d) {
  // Unificato: click singolo aggiunge/toglie dal box come Ctrl+click
  addToSelection(d);
  updateBreadcrumb(d);
}

function updateVisuals() {
  // Evidenzia nodi ATTIVI (con checkbox nel box)
  var allHighlightedIds = new Set();
  
  selectedNodes.forEach(function(sel) {
    if (activeNodeIds.has(sel.techId)) {
      allHighlightedIds.add(sel.id);
      sel.ancestors.forEach(function(aid) { allHighlightedIds.add(aid); });
      sel.descendantIds.forEach(function(did) { allHighlightedIds.add(did); });
    }
  });
  
  if (allHighlightedIds.size === 0) {
    nodes.forEach(function(n) { n.highlighted = false; n.dimmed = false; });
  } else {
    nodes.forEach(function(n) {
      n.highlighted = allHighlightedIds.has(n.id);
      n.dimmed = !n.highlighted;
    });
  }
  
  updateHighlightClasses();
}
// Array nodi nel box (tutti, anche disattivati)
var selectedNodes = [];
// Set di techId attivi (evidenziati sulla mappa)
var activeNodeIds = new Set();

// Selezione multipla (Ctrl/Shift+click)
function addToSelection(d) {
  if (!d.techId) return;
  var idx = selectedNodes.findIndex(function(n) { return n.id === d.id; });
  if (idx >= 0) {
    // Toggle attivo/disattivo
    if (activeNodeIds.has(d.techId)) {
      activeNodeIds.delete(d.techId);
    } else {
      activeNodeIds.add(d.techId);
    }
  } else {
    // Aggiungi al box e attiva
    selectedNodes.push(d);
    activeNodeIds.add(d.techId);
  }
  saveSelection();
  updateSelectionDisplay();
  document.getElementById('breadcrumb').classList.remove('visible');
}

function saveSelection() {
  // Salva solo i nodi attivi in localStorage
  var activeTechIds = selectedNodes
    .filter(function(n) { return activeNodeIds.has(n.techId); })
    .map(function(n) { return n.techId; });
  localStorage.setItem('tdm_selected', JSON.stringify(activeTechIds));
}

// Ricalcola display basandosi su nodi ATTIVI
function updateSelectionDisplay() {
  // Aggiorna solo visualizzazione
  updateVisuals();
  // Aggiorna box
  if (selectedNodes.length > 0) {
    showMultiPopup(selectedNodes);
  } else {
    hideMultiPopup();
  }
}

function updateHighlightClasses() {
  node.classed('highlighted', function(n) { return n.highlighted; })
      .classed('dimmed', function(n) { return n.dimmed; });
  
  link.classed('highlighted', function(l) {
    var src = l.source.id !== undefined ? l.source.id : l.source;
    var tgt = l.target.id !== undefined ? l.target.id : l.target;
    var srcH = nodes.find(function(n) { return n.id === src; });
    var tgtH = nodes.find(function(n) { return n.id === tgt; });
    return srcH && tgtH && srcH.highlighted && tgtH.highlighted;
  }).classed('dimmed', function(l) {
    var src = l.source.id !== undefined ? l.source.id : l.source;
    var tgt = l.target.id !== undefined ? l.target.id : l.target;
    var srcH = nodes.find(function(n) { return n.id === src; });
    var tgtH = nodes.find(function(n) { return n.id === tgt; });
    return !srcH || !tgtH || !srcH.highlighted || !tgtH.highlighted;
  });
}

function clearSelection() {
  selectedNodes = [];
  activeNodeIds.clear();
  localStorage.setItem('tdm_selected', JSON.stringify([]));
  nodes.forEach(function(n) { n.highlighted = false; n.dimmed = false; });
  node.classed('highlighted', false).classed('dimmed', false);
  link.classed('highlighted', false).classed('dimmed', false);
  document.getElementById('breadcrumb').classList.remove('visible');
  hideMultiPopup();
}

function showMultiPopup(targetNodes) {
  var popup = document.getElementById('selectionBox');
  var activeCount = targetNodes.filter(function(tn) { return activeNodeIds.has(tn.techId); }).length;
  var html = '<span class="close" onclick="hideMultiPopup()">&times;</span>';
  html += '<div style="font-weight:bold;margin-bottom:10px;color:#4fc3f7;">' + activeCount + '/' + targetNodes.length + ' tecnologie attive</div>';
  html += '<div style="max-height:300px;overflow-y:auto;">';
  targetNodes.forEach(function(tn) {
    var info = techInfo[tn.techId];
    if (info) {
      var isActive = activeNodeIds.has(tn.techId);
      var checkedAttr = isActive ? 'checked' : '';
      var textColor = isActive ? '#ccc' : '#666';
      html += '<label style="display:flex;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.1);cursor:pointer;">';
      html += '<input type="checkbox" ' + checkedAttr + ' onchange="toggleMultiNode(' + tn.techId + ',this.checked)" style="margin-right:10px;">';
      html += '<span style="color:' + textColor + ';">' + info.name + '</span></label>';
    }
  });
  html += '</div>';
  popup.innerHTML = html;
  popup.classList.add('visible');
}

function hideMultiPopup() {
  document.getElementById('selectionBox').classList.remove('visible');
}

function toggleMultiNode(techId, checked) {
  if (checked) {
    activeNodeIds.add(techId);
  } else {
    activeNodeIds.delete(techId);
  }
  saveSelection();
  updateVisuals();
  // Rigenera box per aggiornare colori
  showMultiPopup(selectedNodes);
}

function updateBreadcrumb(d) {
  var bc = document.getElementById('breadcrumb');
  var path = [];
  d.ancestors.forEach(function(aid) {
    var an = nodes.find(function(x) { return x.id === aid; });
    if (an) path.push(an);
  });
  
  var html = path.map(function(p, i) {
    var cls = i === path.length - 1 ? 'crumb current' : 'crumb';
    return '<span class="' + cls + '" data-id="' + p.id + '">' + p.name + '</span>';
  }).join('<span class="arrow">></span>');
  
  var descCount = d.descendantIds.length;
  if (descCount > 0) {
    html += '<span class="descendants">(' + descCount + ' elementi)</span>';
  }
  
  bc.innerHTML = html;
  bc.classList.add('visible');
  
  bc.querySelectorAll('.crumb').forEach(function(el) {
    el.addEventListener('click', function() {
      var nid = parseInt(this.getAttribute('data-id'));
      var n = nodes.find(function(x) { return x.id === nid; });
      if (n) selectNode(n);
    });
  });
}

  legendTab.style.right = legendPanel.classList.contains('open') ? '200px' : '0';
});

legendTab.addEventListener('click', function() {

// Filtri profondità
var depthLevels = [0, 1, 2, 3, 4];
var visibleDepths = new Set(depthLevels);

function applyDepthFilters() {
  node.style('display', function(d) {
    return visibleDepths.has(d.level) ? null : 'none';
  });
  link.style('display', function(l) {
    var src = typeof l.source === 'object' ? l.source : nodes.find(function(n) { return n.id === l.source; });
    var tgt = typeof l.target === 'object' ? l.target : nodes.find(function(n) { return n.id === l.target; });
    return (src && tgt && visibleDepths.has(src.level) && visibleDepths.has(tgt.level)) ? null : 'none';
  });
}

depthLevels.forEach(function(lvl) {
  var cb = document.getElementById('depth_' + lvl);
  if (cb) {
    cb.addEventListener('change', function() {
      if (this.checked) {
        visibleDepths.add(lvl);
      } else {
        visibleDepths.delete(lvl);
      }
      document.getElementById('depth_all').checked = visibleDepths.size === 5;
      applyDepthFilters();
    });
  }
});

document.getElementById('depth_all').addEventListener('change', function() {
  var checked = this.checked;
  depthLevels.forEach(function(lvl) {
    var cb = document.getElementById('depth_' + lvl);
    if (cb) cb.checked = checked;
    if (checked) visibleDepths.add(lvl); else visibleDepths.delete(lvl);
  });
  applyDepthFilters();
});

// Reset filtri
document.getElementById('resetFilters').addEventListener('click', function() {
  document.querySelectorAll('.filter-item input').forEach(function(cb) {
    cb.checked = true;
  });
  document.getElementById('f_mat_all').checked = true;
  document.getElementById('f_cat_all').checked = true;
  document.getElementById('f_class_all').checked = true;
  // Reset depth filters
  depthLevels.forEach(function(lvl) {
    var cb = document.getElementById('depth_' + lvl);
    if (cb) cb.checked = true;
    visibleDepths.add(lvl);
  });
  document.getElementById('depth_all').checked = true;
  applyFilters();
  applyDepthFilters();
});

document.getElementById('f_cat_all').addEventListener('change', function() {

// Applica filtri on change
document.querySelectorAll('.filter-item input').forEach(function(cb) {

    document.getElementById('f_mat_all').checked = matCheckboxes.every(function(id) { return document.getElementById(id).checked; });
    document.getElementById('f_cat_all').checked = catCheckboxes.every(function(id) { return document.getElementById(id).checked; });
    document.getElementById('f_class_all').checked = classCheckboxes.every(function(id) { return document.getElementById(id).checked; });
    applyFilters();
  });

function applyFilters() {
  var activeMats = [];
  if (document.getElementById('f_metalli').checked) activeMats.push('Metalli');
  if (document.getElementById('f_polimeri').checked) activeMats.push('Polimeri');
  if (document.getElementById('f_legno').checked) activeMats.push('Legno');
  if (document.getElementById('f_vetro').checked) activeMats.push('Vetro');
  if (document.getElementById('f_ceramici').checked) activeMats.push('Ceramici');
  if (document.getElementById('f_compositi').checked) activeMats.push('Compositi');
  
  var activeCats = [];
  if (document.getElementById('f_tagliare').checked) activeCats.push('TAGLIARE');
  if (document.getElementById('f_piegare').checked) activeCats.push('PIEGARE');
  if (document.getElementById('f_scavare').checked) activeCats.push('SCAVARE');
  if (document.getElementById('f_conformare').checked) activeCats.push('CONFORMARE');
  if (document.getElementById('f_fondere').checked) activeCats.push('FONDERE');
  if (document.getElementById('f_stampare_polimeri').checked) activeCats.push('STAMPARE_POLIMERI');
  if (document.getElementById('f_unire').checked) activeCats.push('UNIRE');
  if (document.getElementById('f_proteggere').checked) activeCats.push('PROTEGGERE');
  if (document.getElementById('f_additive').checked) activeCats.push('ADDITIVE');
  if (document.getElementById('f_decorare').checked) activeCats.push('DECORARE');
  
  var activeClasses = [];
  if (document.getElementById('f_sottrazione').checked) activeClasses.push('Sottrazione');
  if (document.getElementById('f_conservazione').checked) activeClasses.push('Conservazione');
  if (document.getElementById('f_incremento').checked) activeClasses.push('Incremento');
  if (document.getElementById('f_trattamento').checked) activeClasses.push('Trattamento');
  
  nodes.forEach(function(n) {
    if (n.level === 0) {
      n.filteredOut = false;
    } else if (n.level === 1) {
      // Materiale: filtra per materiale
      n.filteredOut = !activeMats.includes(n.mat);
    } else if (n.level === 2) {
      // Categoria: filtra per materiale e categoria
      n.filteredOut = !activeMats.includes(n.mat) || !activeCats.includes(n.cat) || !activeClasses.includes(n.cl);
    } else if (n.level === 3) {
      // Tecnologia: filtra per materiale, categoria, classificazione
      n.filteredOut = !activeMats.includes(n.mat) || !activeCats.includes(n.cat) || !activeClasses.includes(n.cl);
    } else {
      // Forma: eredita dal parent
      var parent = nodes.find(function(p) { return p.id === n.parentId; });
      n.filteredOut = parent ? parent.filteredOut : false;
    }
  });
  
  node.classed('filtered-out', function(d) { return d.filteredOut; });
  link.classed('filtered-out', function(l) {
    var src = l.source.id !== undefined ? l.source.id : l.source;
    var tgt = l.target.id !== undefined ? l.target.id : l.target;
    var srcNode = nodes.find(function(x) { return x.id === src; });
    var tgtNode = nodes.find(function(x) { return x.id === tgt; });
    return (srcNode && srcNode.filteredOut) || (tgtNode && tgtNode.filteredOut);
  });
  
  var visibleTech = nodes.filter(function(n) { return n.level === 3 && !n.filteredOut; }).length;
  document.getElementById('techCount').textContent = visibleTech;
}

// Ticked
function ticked() {
  link.attr('d', function(d) {
    var sx = d.source.x, sy = d.source.y;
    var tx = d.target.x, ty = d.target.y;
    var mx = (sx + tx) / 2;
    return 'M' + sx + ',' + sy + ' Q' + mx + ',' + sy + ' ' + mx + ',' + (sy + ty)/2 + ' T' + tx + ',' + ty;
  });
  node.attr('transform', function(d) { return 'translate(' + d.x + ',' + d.y + ')'; });
}

function dragstarted(event, d) {
  if (!event.active) simulation.alphaTarget(0.3).restart();
  d.fx = d.x;
  d.fy = d.y;
}

function dragged(event, d) {
  d.fx = event.x;
  d.fy = event.y;
  d3.select(this).classed('fixed', true);
}

function dragended(event, d) {
  if (!event.active) simulation.alphaTarget(0);
}

svg.on('click', function() {

    showConfirmDialog();

  document.getElementById('confirmDialog').classList.add('visible');

// Funzione fitAll
function fitAll() {
  var bounds = g.node().getBBox();
  var bw = bounds.width, bh = bounds.height;
  var scale = 0.85 / Math.max(bw / width, bh / height);
  scale = Math.min(Math.max(scale, 0.1), 1.5);
  var tx = width / 2 - (bounds.x + bw / 2) * scale;
  var ty = height / 2 - (bounds.y + bh / 2) * scale;
  svg.transition().duration(600).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

// Pulsanti
document.getElementById('fitAll').addEventListener('click', fitAll);

document.getElementById('fitSel').addEventListener('click', function() {
  var selected = nodes.filter(function(n) { return n.highlighted; });
  if (selected.length === 0) return;
  var minX = d3.min(selected, function(d) { return d.x; }) - 50;
  var maxX = d3.max(selected, function(d) { return d.x; }) + 50;
  var minY = d3.min(selected, function(d) { return d.y; }) - 50;
  var maxY = d3.max(selected, function(d) { return d.y; }) + 50;
  var bw = maxX - minX, bh = maxY - minY;
  var scale = 0.8 / Math.max(bw / width, bh / height);
  scale = Math.min(scale, 2);
  var tx = width / 2 - (minX + bw / 2) * scale;
  var ty = height / 2 - (minY + bh / 2) * scale;
  svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
});

// Sblocca: libera i nodi fissati SENZA modificare posizioni
document.getElementById('sblocca').addEventListener('click', function() {
  nodes.forEach(function(n) { n.fx = null; n.fy = null; });
  node.classed('fixed', false);
  // NON riavvia la simulazione, mantiene le posizioni attuali
});

// Backup delle posizioni
var positionBackup = null;

function saveBackup() {
  positionBackup = nodes.map(function(n) {
    return { id: n.id, x: n.x, y: n.y, fx: n.fx, fy: n.fy };
  });
}

// Salva backup iniziale dopo il primo layout
setTimeout(saveBackup, 2000);

// Ripristina: torna all'ultimo backup salvato (senza fissare i nodi)
document.getElementById('ripristina').addEventListener('click', function() {
  if (!positionBackup) return;
  positionBackup.forEach(function(b) {
    var n = nodes.find(function(x) { return x.id === b.id; });
    if (n) {
      n.x = b.x; n.y = b.y;
      n.fx = null; n.fy = null; // Non fissa i nodi
    }
  });
  node.classed('fixed', false);
  simulation.alpha(0.01).restart(); // Minimo movimento per aggiornare posizioni
});

// Reset: riorganizza ottimizzando MA conserva il backup
document.getElementById('reset').addEventListener('click', function() {
  // NON sovrascrive il backup esistente
  nodes.forEach(function(n) { n.fx = null; n.fy = null; });
  node.classed('fixed', false);
  simulation.alpha(1).restart();
  setTimeout(fitAll, 1500);
});

// Riordina: ricalcola layout ottimale dopo spostamenti manuali (reheat)
document.getElementById('riordina').addEventListener('click', function() {
  saveBackup(); // Salva lo stato attuale come nuovo backup
  simulation.alpha(0.5).restart();
  setTimeout(fitAll, 1000);
});

window.addEventListener('resize', function() {
  updateSize();
  simulation.force('y', d3.forceY(height / 2).strength(0.02));
  simulation.alpha(0.3).restart();
});

          document.getElementById('transferDialog').classList.add('visible');
        }
      } catch(e) {}
    }
  });
});

// Supporto URL params: ?tech=1,2,3 evidenzia tecnologie dal database
function checkUrlParams() {
  var params = new URLSearchParams(window.location.search);
  var techParam = params.get('tech');
  var techIds = [];
  
  // Priorità 1: parametro URL
  if (techParam) {
    techIds = techParam.split(',').map(function(s) { return parseInt(s.trim()); }).filter(function(n) { return !isNaN(n); });
  }
  // Priorità 2: localStorage se non c'è URL
  else {
    var savedSel = localStorage.getItem('tdm_selected');
    if (savedSel) {
      try {
        techIds = JSON.parse(savedSel);
      } catch(e) {}
    }
  }
  
  if (techIds.length > 0) {
    techIds.forEach(function(tid) {
      var techNode = nodes.find(function(n) { return n.techId === tid; });
      if (techNode) {
        selectedNodes.push(techNode);
        activeNodeIds.add(tid); // Attiva anche
      }
    });
    if (selectedNodes.length > 0) {
      updateSelectionDisplay();
      setTimeout(function() {
        var sel = nodes.filter(function(n) { return n.highlighted; });
        if (sel.length === 0) return;
        var minX = d3.min(sel, function(d) { return d.x; }) - 50;
        var maxX = d3.max(sel, function(d) { return d.x; }) + 50;
        var minY = d3.min(sel, function(d) { return d.y; }) - 50;
        var maxY = d3.max(sel, function(d) { return d.y; }) + 50;
        var bw = maxX - minX, bh = maxY - minY;
        var scale = Math.min(0.8 / Math.max(bw / width, bh / height), 2);
        var tx = width / 2 - (minX + bw / 2) * scale;
        var ty = height / 2 - (minY + bh / 2) * scale;
        svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
        
        // Mostra popup se selezioni multiple
        if (selectedNodes.length > 1) {
          setTimeout(function() { showMultiPopup(selectedNodes); }, 600);
        }
      }, 1600);
    }
  }
}
setTimeout(checkUrlParams, 1800);
